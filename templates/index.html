<!DOCTYPE html>
<html>
<head>
    <title>Naive Bayes Classifier</title>
</head>
<body>
    <h2>Naive Bayes Classifier App</h2>

    <form action="/train" method="post" enctype="multipart/form-data">

        <label>Upload CSV File:</label><br>
        <input type="file" name="file" required><br><br>

        <label>Target Column Name:</label><br>
        <input type="text" name="target" required><br><br>

        <label>Training Size (0.1 - 0.9):</label><br>
        <input type="number" step="0.1" name="train_size" min="0.1" max="0.9" required><br><br>

        <label>Select Model:</label><br>
        <select name="model">
            <option value="Gaussian">Gaussian</option>
            <option value="Multinomial">Multinomial</option>
            <option value="Bernoulli">Bernoulli</option>
        </select><br><br>

        <input type="submit" value="Train Model">
    </form>
</body>
</html>
